# Lint, typecheck, unit test, and build across Linux / Windows / macOS on every push and PR.

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Node 24 keeps CI aligned with the npm 11 lockfile generated locally.
  # History system still only requires Node >=22.5 for the `node:sqlite` builtin.
  # Keep aligned with build.yml's NODE_VERSION.
  NODE_VERSION: '24'
  SKIP_CLI_BUILD: 'true'
  SKIP_LSP_DOWNLOAD: 'true'

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (OxLint)
        run: npm run lint:check

      - name: Format Check (Biome)
        run: npm run format:check

      - name: Type Check (TypeScript)
        run: npm run typecheck:all

  test:
    name: Test (${{ matrix.os }})
    needs: quality
    runs-on: ${{ matrix.os }}

    # 演进记录:
    # 这里曾经设 `continue-on-error: ${{ matrix.os != 'ubuntu-latest' }}` 作为
    # 边界声明,治表的是 vitest+node 跑 main-process 测试时,在 Windows / macOS
    # runner 上 `require('electron')` 偶发失败的症状(electron 包 postinstall
    # 写 `path.txt` 这一步网络失败 → import 阶段抛 "Electron failed to install
    # correctly")。
    # 现已治根:`tests/renderer/setup.ts` 加全局 `vi.mock('electron', ...)`,
    # 测试链路不再触达真 electron 包的 `getElectronPath` 检查。所有 OS 的
    # test job 恢复硬性要求,移除 continue-on-error。
    # 真大治根(把 main-process 服务依赖注入化、彻底消除 `import 'electron'`
    # 在测试链路传播)仍是独立项目;当前 setup mock 是它的最小可行子集。

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npm run rebuild:native
        continue-on-error: true

      - name: Run Unit Tests
        run: npm run test:run
        env:
          DISPLAY: ':99'

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false
        continue-on-error: true

  build:
    name: Build (${{ matrix.os }})
    needs: quality
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Workers
        run: npm run build:workers

      - name: Build Application (electron-vite)
        run: npx electron-vite build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Verify build output
        shell: bash
        run: |
          echo "Checking build output..."
          ls -la out/ || dir out
          if [ -d "out/main" ] && [ -d "out/renderer" ] && [ -d "out/preload" ]; then
            echo "✓ Build output verified"
          else
            echo "✗ Build output incomplete"
            exit 1
          fi

  e2e:
    name: E2E Tests
    needs: [test, build]
    runs-on: ubuntu-latest
    # Runs on main or when PR is labelled 'run-e2e'.
    if: github.ref == 'refs/heads/main' || contains(github.event.pull_request.labels.*.name, 'run-e2e')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npm run rebuild:native
        continue-on-error: true

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Install system dependencies for Electron
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2t64 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2t64

      - name: Build Application
        run: |
          npm run build:workers
          npx electron-vite build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Package Application for E2E
        run: npx electron-builder --linux --dir
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Run E2E Tests
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" npm run test:e2e
        env:
          SCIPEN_E2E_TEST: 'true'
          SCIPEN_ALLOW_MULTIPLE_INSTANCES: 'true'

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  ci-complete:
    name: CI Complete
    needs: [quality, test, build]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check results
        run: |
          echo "Quality: ${{ needs.quality.result }}"
          echo "Test: ${{ needs.test.result }}"
          echo "Build: ${{ needs.build.result }}"
          
          if [ "${{ needs.quality.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ]; then
            echo "❌ CI failed"
            exit 1
          fi
          
          echo "✅ All CI checks passed!"
